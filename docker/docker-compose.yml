services:
  postgres:
    image: postgres:17-alpine
    container_name: hiveforge-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: hiveforge
    ports:
      - '5555:5432'
    volumes:
      - hiveforge-db-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: hiveforge-redis
    restart: always
    ports:
      - '7500:6379'
    volumes:
      - hiveforge-redis-data:/data

volumes:
  hiveforge-db-data:
  hiveforge-redis-data:
